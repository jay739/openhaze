name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with swiftc
        run: |
          cd macos
          ./build.sh
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with the built-in csc.exe
        shell: cmd
        run: |
          cd windows
          build.bat --no-launch
